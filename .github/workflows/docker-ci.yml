name: Docker Bootstrap Matrix CI

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - '.github/workflows/docker-ci.yml'
  pull_request:
    paths:
      - 'bootstrap/**'
      - '.github/workflows/docker-ci.yml'

jobs:
  test-bootstrap-docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ["ubuntu:latest", "fedora:latest", "alpine:latest"]
    container:
      image: ${{ matrix.image }}
    env:
      # Example secret usage (set MY_SECRET in repo settings for real use)
      MY_SECRET: ${{ secrets.MY_SECRET }}
    steps:
      - name: Install dependencies (Ubuntu/Fedora)
        if: contains(matrix.image, 'ubuntu') || contains(matrix.image, 'fedora')
        run: |
          apt-get update -y || dnf -y update || true
          apt-get install -y git curl wget bash sudo shellcheck || dnf install -y git curl wget bash sudo ShellCheck || true
      - name: Install dependencies (Alpine)
        if: contains(matrix.image, 'alpine')
        run: |
          apk add --no-cache git curl wget bash sudo shellcheck
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lint all shell scripts
        run: |
          find bootstrap -type f -name '*.sh' -exec shellcheck {} +
      - name: Run bootstrap/setup-chezmoi.sh (first run)
        run: |
          chmod +x bootstrap/setup-chezmoi.sh
          ./bootstrap/setup-chezmoi.sh --reinit || true
      - name: Run bootstrap/setup-chezmoi.sh (idempotency check)
        run: |
          ./bootstrap/setup-chezmoi.sh --reinit || true
      - name: Advanced test - check for expected file
        run: |
          test -f /root/.config/nvim/init.vim || echo "[INFO] nvim config not present (expected if not in repo)"
      - name: Advanced test - check script output
        run: |
          grep -q 'Chezmoi setup complete' bootstrap/setup-chezmoi.sh || echo "[INFO] Output check skipped (demo)"

  deploy:
    needs: test-bootstrap-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create GitHub Release (stub)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Automated Release ${{ github.run_number }}"
          body: |
            Automated release from CI. See workflow for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 